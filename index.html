<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tur Virtual - Apartament 2 camere</title>
  <script src="aframe.min.js"></script>
  <script>
  AFRAME.registerComponent('custom-look', {
    schema: { fov: {default: 75} },
    init: function() {
      this.pitch = 0;
      this.yaw = 0;
      this.keys = {};
      this.mouseDown = false;
      this.lastX = 0;
      this.lastY = 0;

      // Keyboard
      this._onKeyDown = e => { this.keys[e.code] = true; };
      this._onKeyUp   = e => { this.keys[e.code] = false; };
      window.addEventListener('keydown', this._onKeyDown);
      window.addEventListener('keyup',   this._onKeyUp);

      // Mouse
      this._onMouseDown = e => { this.mouseDown=true; this.lastX=e.clientX; this.lastY=e.clientY; };
      this._onMouseUp   = () => { this.mouseDown=false; };
      this._onMouseMove = e => {
        if(!this.mouseDown) return;
        const dx = e.clientX - this.lastX;
        const dy = e.clientY - this.lastY;
        this.yaw   -= dx * 0.3;
        this.pitch -= dy * 0.3;
        this.pitch = Math.max(-85, Math.min(85, this.pitch));
        this.lastX = e.clientX;
        this.lastY = e.clientY;
        this._apply();
      };
      window.addEventListener('mousedown', this._onMouseDown);
      window.addEventListener('mouseup',   this._onMouseUp);
      window.addEventListener('mousemove', this._onMouseMove);

      // Touch
      this._onTouchStart = e => { if(e.touches.length===1){ this.mouseDown=true; this.lastX=e.touches[0].clientX; this.lastY=e.touches[0].clientY; }};
      this._onTouchEnd   = () => { this.mouseDown=false; };
      this._onTouchMove  = e => {
        if(!this.mouseDown||e.touches.length!==1) return;
        const dx = e.touches[0].clientX - this.lastX;
        const dy = e.touches[0].clientY - this.lastY;
        this.yaw   -= dx * 0.3;
        this.pitch -= dy * 0.3;
        this.pitch = Math.max(-85, Math.min(85, this.pitch));
        this.lastX = e.touches[0].clientX;
        this.lastY = e.touches[0].clientY;
        this._apply();
      };
      window.addEventListener('touchstart', this._onTouchStart, {passive:true});
      window.addEventListener('touchend',   this._onTouchEnd);
      window.addEventListener('touchmove',  this._onTouchMove, {passive:true});
    },

    tick: function() {
      const speed = 0.8;
      let moved = false;
      if(this.keys['ArrowLeft'])  { this.yaw += speed; moved=true; }
      if(this.keys['ArrowRight']) { this.yaw -= speed; moved=true; }
      if(this.keys['ArrowUp'])    { this.pitch = Math.min(85, this.pitch+speed); moved=true; }
      if(this.keys['ArrowDown'])  { this.pitch = Math.max(-85, this.pitch-speed); moved=true; }
      if(moved) this._apply();
    },

    _apply: function() {
      this.el.setAttribute('rotation', { x: this.pitch, y: this.yaw, z: 0 });
    },

    setRotation: function(pitch, yaw) {
      this.pitch = pitch;
      this.yaw   = yaw;
      this._apply();
    },

    remove: function() {
      window.removeEventListener('keydown',    this._onKeyDown);
      window.removeEventListener('keyup',      this._onKeyUp);
      window.removeEventListener('mousedown',  this._onMouseDown);
      window.removeEventListener('mouseup',    this._onMouseUp);
      window.removeEventListener('mousemove',  this._onMouseMove);
      window.removeEventListener('touchstart', this._onTouchStart);
      window.removeEventListener('touchend',   this._onTouchEnd);
      window.removeEventListener('touchmove',  this._onTouchMove);
    }
  });
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:'Segoe UI',sans-serif; overflow:hidden; width:100vw; height:100vh; }

    /* SIDEBAR */
    #sidebar {
      position:fixed; left:0; top:0; height:100vh;
      width:auto; min-width:120px; max-width:220px;
      background:rgba(8,8,8,0.82); backdrop-filter:blur(12px);
      border-right:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column; z-index:100;
      transition:transform 0.25s ease;
    }
    #sidebar.hidden { transform:translateX(-100%); }

    /* Tab de toggle — lipit de marginea dreapta a sidebar-ului */
    #sidebar-toggle {
      position:fixed; top:50%; transform:translateY(-50%);
      left:0; /* actualizat din JS */
      width:18px; height:52px;
      background:rgba(8,8,8,0.82); backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08); border-left:none;
      border-radius:0 6px 6px 0; cursor:pointer; z-index:101;
      display:flex; align-items:center; justify-content:center;
      color:rgba(255,255,255,0.4); font-size:9px;
      transition:left 0.25s ease;
    }
    #sidebar-toggle:hover { color:rgba(255,255,255,0.8); background:rgba(30,30,30,0.9); }

    #sb-header {
      padding:10px 12px 6px;
      font-size:9px; text-transform:uppercase; letter-spacing:1.5px;
      color:rgba(255,255,255,0.3); flex-shrink:0; white-space:nowrap;
    }
    #scene-list { flex:1; overflow-y:auto; padding:2px 0; }
    #scene-list::-webkit-scrollbar { width:2px; }
    #scene-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

    .si {
      padding:7px 12px; cursor:pointer; font-size:12px;
      color:rgba(255,255,255,0.5); border-left:2px solid transparent;
      transition:all 0.12s; display:flex; align-items:center; gap:6px;
      white-space:nowrap;
    }
    .si:hover { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.8); }
    .si.active { color:#f0a500; border-left-color:#f0a500; background:rgba(240,165,0,0.07); font-weight:600; }
    .si .dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.2); flex-shrink:0; }
    .si.active .dot { background:#f0a500; }

    /* Butoane jos in sidebar */
    #sb-actions { padding:8px; display:flex; flex-direction:column; gap:6px; flex-shrink:0; border-top:1px solid rgba(255,255,255,0.06); }
    .sb-btn {
      padding:7px 10px; background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.55);
      border-radius:7px; cursor:pointer; font-size:11px; font-weight:600;
      text-align:left; transition:all 0.12s; white-space:nowrap;
    }
    .sb-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .sb-btn.vr { background:rgba(240,165,0,0.12); border-color:rgba(240,165,0,0.4); color:#f0a500; }
    .sb-btn.vr:hover { background:rgba(240,165,0,0.22); border-color:#f0a500; }

    #pano-title {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.5); color:#fff; padding:5px 18px;
      border-radius:20px; font-size:13px; font-weight:600;
      pointer-events:none; z-index:100; backdrop-filter:blur(6px); white-space:nowrap;
    }

    #plan-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
    #plan-bg.open { display:flex; }
    #plan-modal { background:#1a1a1a; border-radius:16px; padding:16px; width:min(94vw,880px); max-height:92vh; border:1px solid #333; display:flex; flex-direction:column; gap:10px; }
    #plan-hdr { display:flex; justify-content:space-between; align-items:center; }
    #plan-hdr h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#666; }
    #plan-close { width:28px; height:28px; border-radius:50%; background:#2a2a2a; border:1px solid #444; color:#aaa; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
    #plan-wrap { position:relative; }
    #plan-wrap img { width:100%; height:auto; display:block; border-radius:8px; pointer-events:none; }
    .pdot { position:absolute; border-radius:50%; border:2px solid rgba(255,255,255,0.7); background:rgba(255,255,255,0.12); cursor:pointer; transform:translate(-50%,-50%); transition:all 0.15s; }
    .pdot:hover { border-color:#f0a500; background:rgba(240,165,0,0.2); transform:translate(-50%,-50%) scale(1.2); }
    .pdot.active { border-color:#f0a500; background:rgba(240,165,0,0.35); box-shadow:0 0 0 4px rgba(240,165,0,0.2); }

    .a-enter-vr { display:none !important; }
    .a-loader-title { display:none !important; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sb-header">Panorame</div>
  <div id="scene-list"></div>
  <div id="sb-actions">
    <button class="sb-btn" onclick="openPlan()">🗺️ Plan</button>
    <button class="sb-btn vr" id="btn-vr" onclick="enterVR()">🥽 Intră în VR</button>
  </div>
</div>
<div id="sidebar-toggle" onclick="toggleSidebar()">◀</div>

<div id="pano-title">Se încarcă...</div>

<div id="plan-bg">
  <div id="plan-modal">
    <div id="plan-hdr">
      <h3>Plan apartament</h3>
      <button id="plan-close" onclick="closePlan()">✕</button>
    </div>
    <div id="plan-wrap">
      <img src="00_ap.2cam-TOP-01.jpg" alt="Plan">
    </div>
  </div>
</div>

<a-scene
  id="scene"
  vr-mode-ui="enabled:false"
  loading-screen="enabled:false"
  renderer="antialias:true;colorManagement:false;physicallyCorrectLights:false;maxCanvasWidth:4096;maxCanvasHeight:2048;highRefreshRate:true"
  device-orientation-permission-ui="enabled:false">

  <a-assets timeout="60000"></a-assets>

  <a-sky id="sky" radius="100" segments-height="128" segments-width="128" rotation="0 -90 0"
    material="shader:flat;npot:true;anisotropy:16"></a-sky>

  <a-entity id="hotspots"></a-entity>

  <a-entity id="rig" position="0 1.6 0">
    <a-camera
      id="cam"
      custom-look
      look-controls="enabled:false"
      wasd-controls="enabled:false"
      fov="75">
      <a-cursor
        fuse="false"
        raycaster="objects:.hotspot-mesh;far:200"
        color="white"
        opacity="0"
        scale="0.01 0.01 0.01"
        visible="false">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
const panorame = [
  {id:"hol01",  titlu:"Hol-01",       fisier:"01_ap.2cam-Hol-01-Exp-0.5.jpg",  px:47.5,py:62.0,pm:22},
  {id:"hol02",  titlu:"Hol-02",       fisier:"02_ap.2cam-Hol-02-Exp-0.5.jpg",  px:44.0,py:72.0,pm:22},
  {id:"hol03",  titlu:"Hol-03",       fisier:"03_ap.2cam-Hol-03-Exp-0.5.jpg",  px:50.0,py:72.0,pm:22},
  {id:"liv01",  titlu:"Living-01",    fisier:"04_ap.2cam-LIV-01-Exp-0.jpg",    px:45.0,py:35.0,pm:22},
  {id:"liv02",  titlu:"Living-02",    fisier:"05_ap.2cam-LIV-02-Exp-0.jpg",    px:52.0,py:25.0,pm:22},
  {id:"liv03",  titlu:"Living-03",    fisier:"06_ap.2cam-LIV-03-Exp-0.jpg",    px:40.0,py:22.0,pm:22},
  {id:"liv04",  titlu:"Living-04",    fisier:"07_ap.2cam-LIV-04-Exp-0.jpg",    px:35.0,py:32.0,pm:22},
  {id:"ter01",  titlu:"Terasă-01",    fisier:"08_ap.2cam-TER-01-Exp-0.jpg",    px:82.0,py:22.0,pm:22},
  {id:"ter02",  titlu:"Terasă-02",    fisier:"09_ap.2cam-TER-02-Exp-0.5.jpg",  px:90.0,py:32.0,pm:22},
  {id:"buc01",  titlu:"Bucătărie-01", fisier:"10_ap.2cam-Buc-01_Exp-0.5.jpg",  px:78.0,py:72.0,pm:22},
  {id:"buc02",  titlu:"Bucătărie-02", fisier:"11_ap.2cam-Buc-02_Exp-0.5.jpg",  px:88.0,py:80.0,pm:22},
  {id:"dorm01", titlu:"Dormitor-01",  fisier:"12_ap.2cam-Dorm-01-Exp-0.jpg",   px:14.0,py:25.0,pm:22},
  {id:"dorm02", titlu:"Dormitor-02",  fisier:"13_ap.2cam-Dorm-02-Exp-0.jpg",   px:22.0,py:38.0,pm:22},
  {id:"baie01", titlu:"Baie-01",      fisier:"14_ap.2cam-Baie-01_Exp 1.jpg",   px:10.0,py:72.0,pm:22},
  {id:"baie02", titlu:"Baie-02",      fisier:"15_ap.2cam-Baie-02_Exp 1.jpg",   px:18.0,py:78.0,pm:22},
  {id:"baie03", titlu:"Baie-03",      fisier:"16_ap.2cam-Baie-03_Exp 1.jpg",   px:24.0,py:68.0,pm:22},
];

let HS = {}, IV = {}, activeScene = 'hol01', sidebarOpen = true;
panorame.forEach(p => { HS[p.id] = []; });

function degToRad(d) { return d*Math.PI/180; }

function pitchYawToPos(pitch, yaw, r) {
  const p=degToRad(pitch), y=degToRad(-yaw+180);
  return {
    x: r*Math.cos(p)*Math.sin(y),
    y: r*Math.sin(p),
    z: r*Math.cos(p)*Math.cos(y)
  };
}

function goToScene(id) {
  const pano=panorame.find(p=>p.id===id);
  if(!pano) return;
  const sky=document.getElementById('sky');
  sky.setAttribute('src', pano.fisier);
  const iv=IV[id]||{pitch:0,yaw:0};
  // Seteaza vederea initiala prin componenta custom-look
  const cam = document.getElementById('cam');
  const cl = cam.components['custom-look'];
  if(cl) cl.setRotation(iv.pitch, iv.yaw);
  else cam.setAttribute('rotation',`${iv.pitch} ${iv.yaw} 0`);
  activeScene=id;
  document.getElementById('pano-title').textContent=pano.titlu;
  updateSidebar();
  renderHotspots();
}

function renderHotspots() {
  const c=document.getElementById('hotspots');
  while(c.firstChild) c.removeChild(c.firstChild);
  const hs=HS[activeScene]||[];
  hs.forEach(h=>{
    const target=panorame.find(p=>p.id===h.target);
    if(!target) return;
    const pos=pitchYawToPos(h.pitch,h.yaw,95);
    const sz=(h.size||60)/200;
    const op=(h.opacity||70)/100;
    const ent=document.createElement('a-entity');
    ent.setAttribute('position',`${pos.x} ${pos.y} ${pos.z}`);
    ent.setAttribute('look-at','[camera]');

    if(h.type==='circle') {
      const ring=document.createElement('a-ring');
      ring.setAttribute('radius-inner',sz*0.3);
      ring.setAttribute('radius-outer',sz);
      ring.setAttribute('color','white');
      ring.setAttribute('opacity',op);
      ring.setAttribute('side','double');
      ring.setAttribute('segments-theta','64');
      ring.classList.add('hotspot-mesh');
      ring.setAttribute('data-target',h.target);
      ring.addEventListener('click',()=>goToScene(h.target));
      ring.addEventListener('mouseenter',()=>{ ring.setAttribute('color','#f0a500'); });
      ring.addEventListener('mouseleave',()=>{ ring.setAttribute('color','white'); });
      const dot=document.createElement('a-circle');
      dot.setAttribute('radius',sz*0.25);
      dot.setAttribute('color','white');
      dot.setAttribute('opacity',op*0.6);
      dot.setAttribute('side','double');
      ent.appendChild(ring);
      ent.appendChild(dot);
    } else {
      const cone=document.createElement('a-cone');
      cone.setAttribute('radius-bottom',sz*0.4);
      cone.setAttribute('radius-top',0);
      cone.setAttribute('height',sz*0.8);
      cone.setAttribute('color','white');
      cone.setAttribute('opacity',op);
      cone.setAttribute('segments-radial','8');
      cone.setAttribute('rotation','-90 0 0');
      cone.classList.add('hotspot-mesh');
      cone.setAttribute('data-target',h.target);
      cone.addEventListener('click',()=>goToScene(h.target));
      cone.addEventListener('mouseenter',()=>{ cone.setAttribute('color','#f0a500'); });
      cone.addEventListener('mouseleave',()=>{ cone.setAttribute('color','white'); });
      ent.appendChild(cone);
    }
    c.appendChild(ent);
  });
}

function buildSidebar() {
  const list=document.getElementById('scene-list');
  list.innerHTML='';
  panorame.forEach(p=>{
    const d=document.createElement('div');
    d.className='si'+(p.id===activeScene?' active':'');
    d.id='si-'+p.id;
    d.innerHTML=`<div class="dot"></div><span>${p.titlu}</span>`;
    d.onclick=()=>{ goToScene(p.id); if(window.innerWidth<768) toggleSidebar(); };
    list.appendChild(d);
  });
}

function updateSidebar() {
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('si-'+activeScene);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  const tg = document.getElementById('sidebar-toggle');
  sb.classList.toggle('hidden', !sidebarOpen);
  tg.textContent = sidebarOpen ? '◀' : '▶';
  // Pozitioneaza toggle-ul lipit de sidebar
  if(sidebarOpen) {
    const w = sb.offsetWidth;
    tg.style.left = w + 'px';
  } else {
    tg.style.left = '0px';
  }
}

function updateTogglePos() {
  const sb = document.getElementById('sidebar');
  const tg = document.getElementById('sidebar-toggle');
  if(sidebarOpen) tg.style.left = sb.offsetWidth + 'px';
  else tg.style.left = '0px';
}

function enterVR() {
  document.getElementById('scene').enterVR();
  document.getElementById('btn-vr').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('sidebar-toggle').style.display = 'none';
  document.getElementById('pano-title').style.display = 'none';
}

function checkVRDevice() {
  const isQuest = /OculusBrowser|Quest/.test(navigator.userAgent);
  if(isQuest) {
    document.addEventListener('click', function autoVR(){
      document.removeEventListener('click', autoVR);
      setTimeout(enterVR, 500);
    }, {once:true});
  }
}

document.getElementById('scene').addEventListener('exit-vr',()=>{
  document.getElementById('btn-vr').classList.remove('hidden');
  document.getElementById('sidebar-toggle').style.display = 'flex';
  if(sidebarOpen) document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('pano-title').style.display = 'block';
  updateTogglePos();
});

function openPlan() {
  document.getElementById('plan-bg').classList.add('open');
  renderPlanDots();
}
function closePlan() { document.getElementById('plan-bg').classList.remove('open'); }

function renderPlanDots() {
  document.querySelectorAll('.pdot').forEach(d=>d.remove());
  const wrap=document.getElementById('plan-wrap');
  panorame.forEach(p=>{
    const d=document.createElement('div');
    d.className='pdot'+(p.id===activeScene?' active':'');
    d.style.left=p.px+'%'; d.style.top=p.py+'%';
    d.style.width=p.pm+'px'; d.style.height=p.pm+'px';
    d.title=p.titlu;
    d.onclick=()=>{ goToScene(p.id); closePlan(); };
    wrap.appendChild(d);
  });
}

document.getElementById('plan-bg').addEventListener('click',e=>{
  if(e.target===document.getElementById('plan-bg')) closePlan();
});

// INIT — sterge mai intai datele vechi, apoi incarca
['tur_hotspots','tur_initialView','tur_planPositions',
 'tv_hs','tv_iv','tv_plan',
 'tv2_hs','tv2_iv','tv2_pl'].forEach(k=>localStorage.removeItem(k));

// Incarca doar config.json de pe server (sursa adevarata)
async function loadConfig() {
  try {
    const r = await fetch('config.json?t='+Date.now());
    if(r.ok) {
      const cfg = await r.json();
      if(cfg.hotspots) HS = cfg.hotspots;
      if(cfg.initialView) IV = cfg.initialView;
      if(cfg.planPositions) cfg.planPositions.forEach(s=>{
        const f=panorame.find(x=>x.id===s.id);
        if(f){f.px=s.px;f.py=s.py;f.pm=s.pm;}
      });
      panorame.forEach(p=>{if(!HS[p.id])HS[p.id]=[];});
    }
  } catch(e){ console.log('config.json not found, using defaults'); }
}

buildSidebar();

document.getElementById('scene').addEventListener('loaded', async ()=>{
  await loadConfig();
  goToScene('hol01');
  checkVRDevice();
  setTimeout(updateTogglePos, 100);
  if(window.innerWidth<768){
    sidebarOpen=false;
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('sidebar-toggle').textContent='▶';
    document.getElementById('sidebar-toggle').style.left='0px';
  }
});

// Fallback
setTimeout(async ()=>{
  if(document.getElementById('pano-title').textContent==='Se încarcă...'){
    await loadConfig();
    goToScene('hol01');
  }
},4000);
</script>
</body>
</html>
