<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tur Virtual - Apartament 2 camere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; font-family:'Segoe UI',sans-serif; color:#fff; height:100vh; overflow:hidden; display:flex; }

    /* SIDEBAR */
    #sidebar { width:220px; min-width:220px; height:100vh; background:#1a1a1a; border-right:1px solid #333; display:flex; flex-direction:column; z-index:10; }
    #sidebar-header { padding:14px 16px; border-bottom:1px solid #333; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#888; flex-shrink:0; }
    #scene-list { flex:1; overflow-y:auto; padding:6px 0; }
    .scene-item { padding:9px 16px; cursor:pointer; font-size:13px; color:#bbb; border-left:3px solid transparent; transition:all 0.15s; display:flex; align-items:center; gap:8px; }
    .scene-item:hover { background:rgba(255,255,255,0.06); color:#fff; }
    .scene-item.active { background:rgba(240,165,0,0.1); color:#f0a500; border-left-color:#f0a500; font-weight:600; }
    .scene-item .dot { width:7px; height:7px; border-radius:50%; background:#444; flex-shrink:0; }
    .scene-item.active .dot { background:#f0a500; }
    #sidebar-tools { padding:10px; border-top:1px solid #333; display:flex; flex-direction:column; gap:7px; flex-shrink:0; }
    .tool-btn { width:100%; padding:8px 12px; background:rgba(255,255,255,0.06); border:1px solid #3a3a3a; color:#bbb; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; text-align:left; transition:all 0.15s; }
    .tool-btn:hover { background:rgba(255,255,255,0.12); color:#fff; border-color:#555; }
    .tool-btn.active { background:rgba(240,165,0,0.18); border-color:#f0a500; color:#f0a500; }
    .tool-btn.green { background:rgba(34,197,94,0.12); border-color:#22c55e; color:#22c55e; }
    .tool-btn.green:hover { background:rgba(34,197,94,0.22); }

    /* VIEWER */
    #viewer-wrap { flex:1; position:relative; height:100vh; overflow:hidden; }
    #viewer { width:100%; height:100%; }
    .pnlm-zoom-controls { display:none !important; }

    #version { position:absolute; bottom:6px; left:8px; font-size:10px; color:rgba(255,255,255,0.25); pointer-events:none; z-index:50; }
    #pano-title { position:absolute; top:16px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:6px 20px; border-radius:20px; font-size:14px; font-weight:600; pointer-events:none; z-index:50; backdrop-filter:blur(6px); white-space:nowrap; }
    #info-bar { display:none; position:absolute; top:55px; left:50%; transform:translateX(-50%); padding:7px 18px; border-radius:20px; font-size:12px; font-weight:700; z-index:50; pointer-events:none; white-space:nowrap; }
    #info-bar.visible { display:block; }
    #info-bar.yellow { background:rgba(240,165,0,0.92); color:#111; }
    #info-bar.blue { background:rgba(59,130,246,0.92); color:#fff; }
    #crosshair { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:50; }
    #crosshair.visible { display:block; }

    /* HOTSPOT CSS - fix pannellum visibility:hidden */
    .pnlm-hotspot-base.pnlm-hs-custom {
      visibility:visible !important;
      cursor:pointer !important;
      background:none !important;
      border:none !important;
      width:auto !important;
      height:auto !important;
      transform:translate(-50%,-50%);
    }
    .pnlm-hotspot-base.pnlm-hs-custom.edit-mode {
      outline:2.5px dashed #f0a500 !important;
      outline-offset:4px;
      border-radius:4px;
    }

    /* PLAN MODAL */
    #plan-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; align-items:center; justify-content:center; }
    #plan-bg.open { display:flex; }
    #plan-modal { background:#1a1a1a; border-radius:16px; padding:18px; width:min(94vw,900px); max-height:94vh; border:1px solid #444; box-shadow:0 20px 60px rgba(0,0,0,0.8); display:flex; flex-direction:column; gap:12px; }
    #plan-modal-hdr { display:flex; justify-content:space-between; align-items:center; }
    #plan-modal-hdr h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#888; }
    #plan-modal-hdr-btns { display:flex; gap:8px; }
    .pm-btn { padding:6px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; border:1px solid #555; background:#2a2a2a; color:#ccc; transition:all 0.15s; }
    .pm-btn:hover { border-color:#888; color:#fff; }
    .pm-btn.green { border-color:#22c55e; color:#22c55e; background:rgba(34,197,94,0.1); }
    .pm-btn.cx { width:30px; height:30px; padding:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; }
    #plan-wrap { position:relative; overflow:hidden; flex:1; }
    #plan-wrap img { width:100%; height:auto; display:block; border-radius:8px; pointer-events:none; user-select:none; }
    .pdot { position:absolute; border-radius:50%; border:2.5px solid rgba(255,255,255,0.8); background:rgba(255,255,255,0.15); cursor:grab; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; }
    .pdot:hover { border-color:#f0a500; }
    .pdot.active { border-color:#f0a500; background:rgba(240,165,0,0.35); box-shadow:0 0 0 4px rgba(240,165,0,0.2); }
    #plan-hint { font-size:11px; color:#555; text-align:center; }

    /* HOTSPOT MODAL */
    #hs-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:400; align-items:center; justify-content:center; }
    #hs-bg.open { display:flex; }
    #hs-modal { background:#1c1c1c; border-radius:14px; padding:20px; width:360px; border:1px solid #444; box-shadow:0 20px 60px rgba(0,0,0,0.8); }
    #hs-modal h3 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#888; margin-bottom:16px; }
    .hm-row { margin-bottom:13px; }
    .hm-row label { display:block; font-size:11px; color:#777; margin-bottom:5px; text-transform:uppercase; }
    .hm-row select { width:100%; background:#252525; border:1px solid #444; color:#fff; padding:8px 10px; border-radius:8px; font-size:13px; }
    .type-btns { display:flex; gap:8px; }
    .type-btn { flex:1; padding:9px 8px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; border:2px solid #3a3a3a; background:#222; color:#777; text-align:center; transition:all 0.15s; }
    .type-btn.sel { border-color:#f0a500; background:rgba(240,165,0,0.12); color:#f0a500; }
    .sl-row { display:flex; align-items:center; gap:10px; }
    .sl-row input[type=range] { flex:1; accent-color:#f0a500; }
    .sl-val { min-width:36px; text-align:right; color:#f0a500; font-size:13px; font-weight:600; }
    .hm-btns { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
    .hm-btn { flex:1; min-width:80px; padding:9px; border-radius:9px; cursor:pointer; font-size:12px; font-weight:700; border:none; transition:all 0.15s; }
    .hm-btn.cancel { background:#2a2a2a; color:#aaa; border:1px solid #444; }
    .hm-btn.del { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid #ef4444; }
    .hm-btn.move { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid #3b82f6; }
    .hm-btn.ok { background:#f0a500; color:#111; }

    /* TOAST */
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#fff; padding:9px 22px; border-radius:20px; font-size:13px; font-weight:600; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Panorame (16)</div>
  <div id="scene-list"></div>
  <div id="sidebar-tools">
    <button class="tool-btn" onclick="openPlan()">🗺️ Plan apartament</button>
    <button class="tool-btn" id="btn-add-hs" onclick="startAddHS()">➕ Adaugă hotspot</button>
    <button class="tool-btn" id="btn-edit-hs" onclick="toggleEditMode()">✏️ Editează hotspot-uri</button>
    <button class="tool-btn" id="btn-iv" onclick="startIV()">👁️ Vedere inițială</button>
    <button class="tool-btn green" onclick="saveAll()">💾 Salvează tot</button>
  </div>
</div>

<div id="viewer-wrap">
  <div id="viewer"></div>
  <div id="version">v18</div>
  <div id="pano-title">Hol-01</div>
  <div id="info-bar"></div>
  <div id="crosshair"><svg width="44" height="44"><circle cx="22" cy="22" r="20" fill="none" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="4 3"/><line x1="22" y1="8" x2="22" y2="36" stroke="#f0a500" stroke-width="1.5"/><line x1="8" y1="22" x2="36" y2="22" stroke="#f0a500" stroke-width="1.5"/></svg></div>
</div>

<!-- PLAN -->
<div id="plan-bg">
  <div id="plan-modal">
    <div id="plan-modal-hdr">
      <h3>Plan apartament</h3>
      <div id="plan-modal-hdr-btns">
        <button class="pm-btn green" onclick="savePlan()">💾 Salvează pozițiile</button>
        <button class="pm-btn cx" onclick="closePlan()">✕</button>
      </div>
    </div>
    <div id="plan-wrap"><img src="00_ap.2cam-TOP-01.jpg" alt="Plan"></div>
    <div id="plan-hint">Trage punctele • Scroll pe punct = schimbă mărimea • Click = navighează</div>
  </div>
</div>

<!-- EDITOR HOTSPOT -->
<div id="hs-bg">
  <div id="hs-modal">
    <h3 id="hs-title">Hotspot nou</h3>
    <div class="hm-row">
      <label>Tip</label>
      <div class="type-btns">
        <div class="type-btn sel" id="tb-c" onclick="setType('circle')">⭕ Cerc podea</div>
        <div class="type-btn" id="tb-a" onclick="setType('arrow')">⬆️ Săgeată ușă</div>
      </div>
    </div>
    <div class="hm-row">
      <label>Duce către</label>
      <select id="hs-sel"></select>
    </div>
    <div class="hm-row">
      <label>Mărime</label>
      <div class="sl-row">
        <input type="range" id="sl-sz" min="30" max="140" value="60" oninput="slUpd()">
        <span class="sl-val" id="sv-sz">60</span>
      </div>
    </div>
    <div class="hm-row">
      <label>Transparență</label>
      <div class="sl-row">
        <input type="range" id="sl-op" min="10" max="100" value="70" oninput="slUpd()">
        <span class="sl-val" id="sv-op">70%</span>
      </div>
    </div>
    <div class="hm-btns">
      <button class="hm-btn cancel" onclick="closeHSModal()">Anulează</button>
      <button class="hm-btn del" id="btn-del" onclick="delHS()">🗑️ Șterge</button>
      <button class="hm-btn move" id="btn-move" onclick="startMove()">📍 Mută</button>
      <button class="hm-btn ok" onclick="confirmHS()">✓ OK</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== DATE =====
const panorame = [
  {id:"hol01",  titlu:"Hol-01",       fisier:"01_ap.2cam-Hol-01-Exp-0.5.jpg",  px:47.5,py:62.0,pm:22},
  {id:"hol02",  titlu:"Hol-02",       fisier:"02_ap.2cam-Hol-02-Exp-0.5.jpg",  px:44.0,py:72.0,pm:22},
  {id:"hol03",  titlu:"Hol-03",       fisier:"03_ap.2cam-Hol-03-Exp-0.5.jpg",  px:50.0,py:72.0,pm:22},
  {id:"liv01",  titlu:"Living-01",    fisier:"04_ap.2cam-LIV-01-Exp-0.jpg",    px:45.0,py:35.0,pm:22},
  {id:"liv02",  titlu:"Living-02",    fisier:"05_ap.2cam-LIV-02-Exp-0.jpg",    px:52.0,py:25.0,pm:22},
  {id:"liv03",  titlu:"Living-03",    fisier:"06_ap.2cam-LIV-03-Exp-0.jpg",    px:40.0,py:22.0,pm:22},
  {id:"liv04",  titlu:"Living-04",    fisier:"07_ap.2cam-LIV-04-Exp-0.jpg",    px:35.0,py:32.0,pm:22},
  {id:"ter01",  titlu:"Terasă-01",    fisier:"08_ap.2cam-TER-01-Exp-0.jpg",    px:82.0,py:22.0,pm:22},
  {id:"ter02",  titlu:"Terasă-02",    fisier:"09_ap.2cam-TER-02-Exp-0.5.jpg",  px:90.0,py:32.0,pm:22},
  {id:"buc01",  titlu:"Bucătărie-01", fisier:"10_ap.2cam-Buc-01_Exp-0.5.jpg",  px:78.0,py:72.0,pm:22},
  {id:"buc02",  titlu:"Bucătărie-02", fisier:"11_ap.2cam-Buc-02_Exp-0.5.jpg",  px:88.0,py:80.0,pm:22},
  {id:"dorm01", titlu:"Dormitor-01",  fisier:"12_ap.2cam-Dorm-01-Exp-0.jpg",   px:14.0,py:25.0,pm:22},
  {id:"dorm02", titlu:"Dormitor-02",  fisier:"13_ap.2cam-Dorm-02-Exp-0.jpg",   px:22.0,py:38.0,pm:22},
  {id:"baie01", titlu:"Baie-01",      fisier:"14_ap.2cam-Baie-01_Exp 1.jpg",   px:10.0,py:72.0,pm:22},
  {id:"baie02", titlu:"Baie-02",      fisier:"15_ap.2cam-Baie-02_Exp 1.jpg",   px:18.0,py:78.0,pm:22},
  {id:"baie03", titlu:"Baie-03",      fisier:"16_ap.2cam-Baie-03_Exp 1.jpg",   px:24.0,py:68.0,pm:22},
];

// ===== STATE =====
let HS = {};        // hotspots per scene: { sceneId: [{pitch,yaw,type,target,size,opacity},...] }
let IV = {};        // initial view per scene: { sceneId: {pitch,yaw,hfov} }
let activeScene = 'hol01';
let editMode = false;
let ivMode = false;
let addingHS = false;
let movingHS = false;
let pendingHS = null;
let editIdx = null;
let viewer = null;

panorame.forEach(p => { HS[p.id] = []; });

// ===== STORAGE =====
function load() {
  try {
    const h=localStorage.getItem('tv2_hs'); if(h) HS=JSON.parse(h);
    const v=localStorage.getItem('tv2_iv'); if(v) IV=JSON.parse(v);
    const p=localStorage.getItem('tv2_pl');
    if(p) JSON.parse(p).forEach(s=>{const f=panorame.find(x=>x.id===s.id);if(f){f.px=s.px;f.py=s.py;f.pm=s.pm;}});
    // Asigura-te ca fiecare scena are array
    panorame.forEach(p=>{ if(!HS[p.id]) HS[p.id]=[]; });
  } catch(e){}
}

function saveAll() {
  localStorage.setItem('tv2_hs', JSON.stringify(HS));
  localStorage.setItem('tv2_iv', JSON.stringify(IV));
  localStorage.setItem('tv2_pl', JSON.stringify(panorame.map(p=>({id:p.id,px:p.px,py:p.py,pm:p.pm}))));
  toast('✅ Salvat!');
}

function savePlan() {
  localStorage.setItem('tv2_pl', JSON.stringify(panorame.map(p=>({id:p.id,px:p.px,py:p.py,pm:p.pm}))));
  toast('✅ Pozițiile salvate!');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function infoBar(msg, color) {
  const b=document.getElementById('info-bar');
  if(!msg) { b.classList.remove('visible'); return; }
  b.textContent=msg; b.className='visible '+(color||'yellow');
}

// ===== PANNELLUM =====
function hsTooltipFn(div, args) {
  div.style.opacity=(args.opacity||70)/100;
  if(args.type==='circle') {
    const s=args.size||60;
    div.innerHTML=`<svg width="${s}" height="${Math.round(s*0.45)}" viewBox="0 0 100 45">
      <ellipse cx="50" cy="22" rx="46" ry="20" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3"/>
      <ellipse cx="50" cy="22" rx="16" ry="7" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
    </svg>`;
  } else {
    const s=args.size||60,w=Math.round(s*0.65);
    div.innerHTML=`<svg width="${w}" height="${s}" viewBox="0 0 40 60">
      <polygon points="20,3 38,28 27,28 27,57 13,57 13,28 2,28" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>`;
  }
  if(editMode) div.classList.add('edit-mode');
}

function hsClickFn(e, args) {
  if(addingHS||movingHS) return;
  if(editMode) {
    // Editare — deschide modal
    editIdx = args.idx;
    pendingHS = {...HS[activeScene][args.idx]};
    openHSModal(true);
  } else {
    goToScene(args.target);
  }
}

function buildScenes() {
  const s={};
  panorame.forEach(p=>{
    const iv=IV[p.id]||{pitch:0,yaw:0,hfov:100};
    const hotspots=(HS[p.id]||[]).map((h,i)=>({
      type:'custom',
      pitch:h.pitch, yaw:h.yaw,
      cssClass:'pnlm-hs-custom',
      createTooltipFunc:hsTooltipFn,
      createTooltipArgs:{type:h.type,size:h.size,opacity:h.opacity,target:h.target,idx:i},
      clickHandlerFunc:hsClickFn,
      clickHandlerArgs:{target:h.target,idx:i}
    }));
    s[p.id]={title:p.titlu,panorama:p.fisier,pitch:iv.pitch,yaw:iv.yaw,hfov:iv.hfov,hotSpots:hotspots};
  });
  return s;
}

function initViewer(sceneId) {
  if(viewer) { try{viewer.destroy();}catch(e){} }
  document.getElementById('viewer').innerHTML='';
  viewer=pannellum.viewer('viewer',{
    default:{firstScene:sceneId,autoLoad:true,showControls:false,mouseZoom:false,keyboardZoom:false,showFullscreenCtrl:false},
    scenes:buildScenes()
  });
  viewer.on('scenechange',function(id){
    activeScene=id;
    document.getElementById('pano-title').textContent=panorame.find(p=>p.id===id)?.titlu||'';
    updateSidebar();
  });
  activeScene=sceneId;
  document.getElementById('pano-title').textContent=panorame.find(p=>p.id===sceneId)?.titlu||'';
  updateSidebar();
  document.getElementById('viewer-wrap').addEventListener('wheel',e=>e.stopPropagation(),{capture:true,once:false,passive:false});
}

function goToScene(id) {
  initViewer(id);
}

// ===== SIDEBAR =====
function buildSidebar() {
  const list=document.getElementById('scene-list');
  list.innerHTML='';
  panorame.forEach(p=>{
    const d=document.createElement('div');
    d.className='scene-item'+(p.id===activeScene?' active':'');
    d.id='si-'+p.id;
    d.innerHTML=`<div class="dot"></div><span>${p.titlu}</span>`;
    d.onclick=()=>goToScene(p.id);
    list.appendChild(d);
  });
}

function updateSidebar() {
  document.querySelectorAll('.scene-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('si-'+activeScene);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}

// ===== EDIT MODE =====
function toggleEditMode() {
  editMode=!editMode;
  document.getElementById('btn-edit-hs').classList.toggle('active',editMode);
  document.getElementById('btn-edit-hs').textContent=editMode?'✏️ Editare ON — click pe hotspot':'✏️ Editează hotspot-uri';
  infoBar(editMode?'Click pe un hotspot pentru a-l edita':null);
  initViewer(activeScene); // rebuild ca sa aplice/scoata edit-mode CSS
}

// ===== ADAUGARE HOTSPOT =====
function startAddHS() {
  if(editMode) toggleEditMode();
  addingHS=true;
  document.getElementById('btn-add-hs').classList.add('active');
  infoBar('🎯 Click pe ecran unde vrei hotspot-ul','yellow');
  document.getElementById('crosshair').classList.add('visible');
  document.getElementById('viewer-wrap').style.cursor='crosshair';
  document.getElementById('viewer-wrap').addEventListener('click',onPlaceClick);
}

function stopAddHS() {
  addingHS=false;
  document.getElementById('btn-add-hs').classList.remove('active');
  infoBar(null);
  document.getElementById('crosshair').classList.remove('visible');
  document.getElementById('viewer-wrap').style.cursor='';
  document.getElementById('viewer-wrap').removeEventListener('click',onPlaceClick);
}

function onPlaceClick(e) {
  if(e.target.closest('.pnlm-hotspot-base')) return;
  const wrap=document.getElementById('viewer-wrap');
  const r=wrap.getBoundingClientRect();
  const xf=(e.clientX-r.left)/r.width;
  const yf=(e.clientY-r.top)/r.height;
  const hfov=viewer.getHfov();
  const vfov=hfov*(r.height/r.width);
  pendingHS={
    pitch:viewer.getPitch()-(yf-0.5)*vfov,
    yaw:viewer.getYaw()+(xf-0.5)*hfov,
    type:'circle',size:60,opacity:70,target:''
  };
  editIdx=null;
  stopAddHS();
  openHSModal(false);
}

// ===== MUTARE HOTSPOT =====
function makeHSPreviewHTML(type, size, opacity) {
  if(type==='circle') {
    const s=size||60;
    return `<svg width="${s}" height="${Math.round(s*0.45)}" viewBox="0 0 100 45">
      <ellipse cx="50" cy="22" rx="46" ry="20" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3"/>
      <ellipse cx="50" cy="22" rx="16" ry="7" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
    </svg>`;
  } else {
    const s=size||60,w=Math.round(s*0.65);
    return `<svg width="${w}" height="${s}" viewBox="0 0 40 60">
      <polygon points="20,3 38,28 27,28 27,57 13,57 13,28 2,28" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>`;
  }
}

let moveGhost = null;

function createGhost() {
  if(moveGhost) moveGhost.remove();
  moveGhost = document.createElement('div');
  moveGhost.style.cssText = `
    position:absolute; pointer-events:none; z-index:200;
    transform:translate(-50%,-50%); transition:none;
    opacity:${(pendingHS.opacity||70)/100};
    filter:drop-shadow(0 0 8px rgba(240,165,0,0.8));
  `;
  moveGhost.innerHTML = makeHSPreviewHTML(pendingHS.type, pendingHS.size, pendingHS.opacity);
  document.getElementById('viewer-wrap').appendChild(moveGhost);
}

function updateGhost(e) {
  if(!movingHS||!moveGhost) return;
  const wrap=document.getElementById('viewer-wrap');
  const r=wrap.getBoundingClientRect();
  moveGhost.style.left=(e.clientX-r.left)+'px';
  moveGhost.style.top=(e.clientY-r.top)+'px';
}

function removeGhost() {
  if(moveGhost) { moveGhost.remove(); moveGhost=null; }
}

function startMove() {
  if(pendingHS) {
    pendingHS.target = document.getElementById('hs-sel').value;
    pendingHS.type = document.getElementById('tb-c').classList.contains('sel') ? 'circle' : 'arrow';
    pendingHS.size = +document.getElementById('sl-sz').value;
    pendingHS.opacity = +document.getElementById('sl-op').value;
  }
  document.getElementById('hs-bg').classList.remove('open');
  movingHS=true;
  infoBar('📍 Mută cursorul și click pentru a poziționa hotspot-ul','blue');
  document.getElementById('crosshair').classList.remove('visible'); // ascunde crosshair, ghost il inlocuieste
  document.getElementById('viewer-wrap').style.cursor='none';
  createGhost();
  document.getElementById('viewer-wrap').addEventListener('mousemove', updateGhost);
  document.getElementById('viewer-wrap').addEventListener('click',onMoveClick);
}

function onMoveClick(e) {
  if(!movingHS) return;
  const wrap=document.getElementById('viewer-wrap');
  const r=wrap.getBoundingClientRect();
  const xf=(e.clientX-r.left)/r.width;
  const yf=(e.clientY-r.top)/r.height;
  const hfov=viewer.getHfov();
  const vfov=hfov*(r.height/r.width);
  if(pendingHS) {
    pendingHS.pitch=viewer.getPitch()-(yf-0.5)*vfov;
    pendingHS.yaw=viewer.getYaw()+(xf-0.5)*hfov;
    if(editIdx!==null) HS[activeScene][editIdx]={...pendingHS};
  }
  movingHS=false;
  infoBar(null);
  removeGhost();
  document.getElementById('viewer-wrap').style.cursor='';
  document.getElementById('viewer-wrap').removeEventListener('mousemove',updateGhost);
  document.getElementById('viewer-wrap').removeEventListener('click',onMoveClick);
  pendingHS=null; editIdx=null;
  saveAll();
  initViewer(activeScene);
  toast('✅ Hotspot mutat!');
}

// ===== MODAL HOTSPOT =====
function openHSModal(isEdit) {
  const sel=document.getElementById('hs-sel');
  sel.innerHTML=panorame.filter(p=>p.id!==activeScene)
    .map(p=>`<option value="${p.id}" ${pendingHS.target===p.id?'selected':''}>${p.titlu}</option>`).join('');
  if(!pendingHS.target&&sel.options[0]) pendingHS.target=sel.options[0].value;
  document.getElementById('hs-title').textContent=isEdit?'Editează hotspot':'Hotspot nou';
  document.getElementById('btn-del').style.display=isEdit?'flex':'none';
  document.getElementById('btn-move').style.display=isEdit?'flex':'none';
  setType(pendingHS.type||'circle');
  document.getElementById('sl-sz').value=pendingHS.size||60;
  document.getElementById('sl-op').value=pendingHS.opacity||70;
  slUpd();
  document.getElementById('hs-bg').classList.add('open');
}

function closeHSModal() {
  document.getElementById('hs-bg').classList.remove('open');
  pendingHS=null; editIdx=null;
}

function setType(t) {
  if(pendingHS) pendingHS.type=t;
  document.getElementById('tb-c').classList.toggle('sel',t==='circle');
  document.getElementById('tb-a').classList.toggle('sel',t==='arrow');
}

function slUpd() {
  const sz=+document.getElementById('sl-sz').value;
  const op=+document.getElementById('sl-op').value;
  document.getElementById('sv-sz').textContent=sz;
  document.getElementById('sv-op').textContent=op+'%';
  if(pendingHS){pendingHS.size=sz;pendingHS.opacity=op;}

  // Preview live — gaseste elementul hotspot activ din DOM
  if(editIdx!==null) {
    const hsEls=document.querySelectorAll('.pnlm-hotspot-base.pnlm-hs-custom');
    const el=hsEls[editIdx];
    if(el) {
      el.style.opacity=op/100;
      const type=document.getElementById('tb-c').classList.contains('sel')?'circle':'arrow';
      if(type==='circle') {
        el.innerHTML=`<svg width="${sz}" height="${Math.round(sz*0.45)}" viewBox="0 0 100 45">
          <ellipse cx="50" cy="22" rx="46" ry="20" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3"/>
          <ellipse cx="50" cy="22" rx="16" ry="7" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
        </svg>`;
      } else {
        const w=Math.round(sz*0.65);
        el.innerHTML=`<svg width="${w}" height="${sz}" viewBox="0 0 40 60">
          <polygon points="20,3 38,28 27,28 27,57 13,57 13,28 2,28" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>`;
      }
      if(editMode) el.classList.add('edit-mode');
    }
  }
}

function confirmHS() {
  if(!pendingHS) return;
  pendingHS.target = document.getElementById('hs-sel').value;
  pendingHS.type = document.getElementById('tb-c').classList.contains('sel') ? 'circle' : 'arrow';
  pendingHS.size = +document.getElementById('sl-sz').value;
  pendingHS.opacity = +document.getElementById('sl-op').value;
  if(editIdx!==null) {
    HS[activeScene][editIdx]={...pendingHS};
  } else {
    HS[activeScene].push({...pendingHS});
  }
  const savedEditIdx = editIdx;
  closeHSModal();
  saveAll();
  initViewer(activeScene);
}

function delHS() {
  if(editIdx===null) return;
  HS[activeScene].splice(editIdx,1);
  closeHSModal();
  saveAll();
  initViewer(activeScene);
  toast('🗑️ Hotspot șters!');
}

// ===== INITIAL VIEW =====
function startIV() {
  if(ivMode) {
    ivMode=false;
    document.getElementById('btn-iv').classList.remove('active');
    document.getElementById('btn-iv').textContent='👁️ Vedere inițială';
    infoBar(null);
    IV[activeScene]={pitch:viewer.getPitch(),yaw:viewer.getYaw(),hfov:viewer.getHfov()};
    saveAll();
    toast('✅ Vedere inițială salvată!');
  } else {
    ivMode=true;
    document.getElementById('btn-iv').classList.add('active');
    document.getElementById('btn-iv').textContent='✅ Salvează vederea';
    infoBar('👁️ Orientează panorama, apoi apasă "Salvează vederea"','blue');
  }
}

// ===== PLAN =====
let planDrag={active:false,dot:null,pano:null,sx:0,sy:0,sl:0,st:0,moved:false};

document.addEventListener('mousemove',e=>{
  if(!planDrag.active) return;
  const dx=e.clientX-planDrag.sx,dy=e.clientY-planDrag.sy;
  if(Math.abs(dx)>5||Math.abs(dy)>5) planDrag.moved=true;
  if(!planDrag.moved) return;
  const r=document.getElementById('plan-wrap').getBoundingClientRect();
  planDrag.pano.px=Math.max(0,Math.min(100,planDrag.sl+dx/r.width*100));
  planDrag.pano.py=Math.max(0,Math.min(100,planDrag.st+dy/r.height*100));
  planDrag.dot.style.left=planDrag.pano.px+'%';
  planDrag.dot.style.top=planDrag.pano.py+'%';
});

document.addEventListener('mouseup',e=>{
  if(!planDrag.active) return;
  const moved=planDrag.moved;
  planDrag.active=false; planDrag.moved=false;
  if(!moved&&planDrag.pano){ goToScene(planDrag.pano.id); closePlan(); }
  planDrag.dot=null; planDrag.pano=null;
});

function openPlan() {
  document.getElementById('plan-bg').classList.add('open');
  renderDots();
}
function closePlan() { document.getElementById('plan-bg').classList.remove('open'); }

function renderDots() {
  document.querySelectorAll('.pdot').forEach(d=>d.remove());
  const wrap=document.getElementById('plan-wrap');
  panorame.forEach(p=>{
    const d=document.createElement('div');
    d.className='pdot'+(p.id===activeScene?' active':'');
    d.id='pd-'+p.id;
    d.style.left=p.px+'%'; d.style.top=p.py+'%';
    d.style.width=p.pm+'px'; d.style.height=p.pm+'px';
    d.title=p.titlu;
    d.addEventListener('mousedown',e=>{
      planDrag.active=true; planDrag.moved=false;
      planDrag.dot=d; planDrag.pano=p;
      planDrag.sx=e.clientX; planDrag.sy=e.clientY;
      planDrag.sl=p.px; planDrag.st=p.py;
      e.preventDefault(); e.stopPropagation();
    });
    d.addEventListener('wheel',e=>{
      e.preventDefault();
      p.pm=Math.max(12,Math.min(50,p.pm-Math.sign(e.deltaY)*2));
      d.style.width=p.pm+'px'; d.style.height=p.pm+'px';
    },{passive:false});
    wrap.appendChild(d);
  });
}

// ===== INIT =====
load();
buildSidebar();
initViewer('hol01');
</script>
