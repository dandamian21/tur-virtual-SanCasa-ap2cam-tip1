<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tur Virtual - Apartament 2 camere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: 'Segoe UI', sans-serif; color: #fff; height: 100vh; overflow: hidden; }

    #viewer { width: 100%; height: 100vh; }

    /* Titlu panorama */
    #pano-title {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 7px 22px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(6px);
    }

    /* Buton plan */
    #btn-plan {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 9px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      z-index: 200;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
      user-select: none;
    }
    #btn-plan:hover { background: rgba(255,255,255,0.28); }

    /* Panel plan - overlay mare */
    #plan-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 900px);
      max-height: 90vh;
      background: rgba(15,15,15,0.97);
      border-radius: 18px;
      padding: 20px;
      z-index: 500;
      display: none;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    #plan-panel.open { display: block; }

    /* Overlay inchidere click afara */
    #plan-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 499;
    }
    #plan-overlay.open { display: block; }

    #plan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #plan-panel h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #aaa;
      margin: 0;
    }

    #btn-close-plan {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #btn-close-plan:hover { background: rgba(255,255,255,0.25); }

    #plan-container {
      position: relative;
      width: 100%;
    }
    #plan-container img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    /* Butoane pe plan */
    .plan-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid #fff;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: background 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
    }
    .plan-dot:hover { background: rgba(255,255,255,0.5); transform: translate(-50%,-50%) scale(1.2); }
    .plan-dot.active {
      background: #f0a500;
      border-color: #f0a500;
      box-shadow: 0 0 0 4px rgba(240,165,0,0.35);
      transform: translate(-50%,-50%) scale(1.15);
    }

    /* Modul editare pozitii */
    #btn-edit {
      position: absolute;
      bottom: 24px;
      right: 130px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      z-index: 200;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #btn-edit:hover { background: rgba(255,165,0,0.3); border-color: #f0a500; }
    #btn-edit.editing { background: rgba(240,165,0,0.4); border-color: #f0a500; color: #f0a500; }

    #edit-hint {
      display: none;
      font-size: 10px;
      color: #f0a500;
      margin-top: 8px;
      text-align: center;
      line-height: 1.4;
    }
    #edit-hint.visible { display: block; }

    #btn-export {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: #f0a500;
      color: #111;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-export.visible { display: block; }

    #export-output {
      display: none;
      margin-top: 8px;
      background: #000;
      color: #0f0;
      font-size: 10px;
      padding: 8px;
      border-radius: 6px;
      max-height: 120px;
      overflow-y: auto;
      word-break: break-all;
      white-space: pre-wrap;
    }
    #export-output.visible { display: block; }
  </style>
</head>
<body>

<div id="viewer"></div>
<div id="pano-title">Hol-01</div>

<button id="btn-edit" onclick="toggleEdit()">✏️ Editează plan</button>
<button id="btn-plan" onclick="togglePlan()">🗺️ Plan</button>

<div id="plan-overlay" onclick="togglePlan()"></div>
<div id="plan-panel">
  <div id="plan-header">
    <h3>Plan apartament</h3>
    <button id="btn-close-plan" onclick="togglePlan()">✕</button>
  </div>
  <div id="plan-container">
    <img id="plan-img" src="00_ap.2cam-TOP-01.jpg" alt="Plan apartament">
    <!-- Punctele de pe plan sunt generate dinamic de JS -->
  </div>
  <div id="edit-hint">Trage punctele pentru a le repoziționa.<br>Scroll pe punct = schimbă mărimea.</div>
  <button id="btn-export" onclick="exportPositions()">📋 Copiază pozițiile noi</button>
  <div id="export-output"></div>
</div>

<script>
// ============================================================
// CONFIGURARE TUR
// Editează titlurile și ordinea panoramelor după preferință
// ============================================================
const panorame = [
  { id: "hol01",     titlu: "Hol-01",        fisier: "01_ap.2cam-Hol-01-Exp-0.5.jpg",   planX: 47.5, planY: 62.0, marime: 22 },
  { id: "hol02",     titlu: "Hol-02",        fisier: "02_ap.2cam-Hol-02-Exp-0.5.jpg",   planX: 44.0, planY: 72.0, marime: 22 },
  { id: "hol03",     titlu: "Hol-03",        fisier: "03_ap.2cam-Hol-03-Exp-0.5.jpg",   planX: 50.0, planY: 72.0, marime: 22 },
  { id: "liv01",     titlu: "Living-01",     fisier: "04_ap.2cam-LIV-01-Exp-0.jpg",     planX: 45.0, planY: 35.0, marime: 22 },
  { id: "liv02",     titlu: "Living-02",     fisier: "05_ap.2cam-LIV-02-Exp-0.jpg",     planX: 52.0, planY: 25.0, marime: 22 },
  { id: "liv03",     titlu: "Living-03",     fisier: "06_ap.2cam-LIV-03-Exp-0.jpg",     planX: 40.0, planY: 22.0, marime: 22 },
  { id: "liv04",     titlu: "Living-04",     fisier: "07_ap.2cam-LIV-04-Exp-0.jpg",     planX: 35.0, planY: 32.0, marime: 22 },
  { id: "ter01",     titlu: "Terasă-01",     fisier: "08_ap.2cam-TER-01-Exp-0.jpg",     planX: 82.0, planY: 22.0, marime: 22 },
  { id: "ter02",     titlu: "Terasă-02",     fisier: "09_ap.2cam-TER-02-Exp-0.5.jpg",   planX: 90.0, planY: 32.0, marime: 22 },
  { id: "buc01",     titlu: "Bucătărie-01",  fisier: "10_ap.2cam-Buc-01-Exp-0.5.jpg",   planX: 78.0, planY: 72.0, marime: 22 },
  { id: "buc02",     titlu: "Bucătărie-02",  fisier: "11_ap.2cam-Buc-02-Exp-0.5.jpg",   planX: 88.0, planY: 80.0, marime: 22 },
  { id: "dorm01",    titlu: "Dormitor-01",   fisier: "12_ap.2cam-Dorm-01-Exp-0.jpg",    planX: 14.0, planY: 25.0, marime: 22 },
  { id: "dorm02",    titlu: "Dormitor-02",   fisier: "13_ap.2cam-Dorm-02-Exp-0.jpg",    planX: 22.0, planY: 38.0, marime: 22 },
  { id: "baie01",    titlu: "Baie-01",       fisier: "14_ap.2cam-Baie-01-Exp-1.jpg",    planX: 10.0, planY: 72.0, marime: 22 },
  { id: "baie02",    titlu: "Baie-02",       fisier: "15_ap.2cam-Baie-02-Exp-1.jpg",    planX: 18.0, planY: 78.0, marime: 22 },
  { id: "baie03",    titlu: "Baie-03",       fisier: "16_ap.2cam-Baie-03-Exp-1.jpg",    planX: 24.0, planY: 68.0, marime: 22 },
];

// ============================================================
// HOTSPOT-URI DE NAVIGARE
// De la -> Catre (editează după ce testezi turul)
// ============================================================
const legaturi = [
  ["hol01", "hol02"], ["hol01", "hol03"],
  ["hol02", "hol03"], ["hol02", "liv01"],
  ["hol03", "liv01"], ["hol03", "baie01"],
  ["hol03", "dorm01"],
  ["liv01", "liv02"], ["liv01", "liv03"], ["liv01", "liv04"],
  ["liv02", "liv03"], ["liv02", "ter01"],
  ["liv03", "liv04"], ["liv03", "ter01"],
  ["liv04", "dorm01"],
  ["ter01", "ter02"],
  ["buc01", "buc02"], ["buc01", "hol02"],
  ["dorm01", "dorm02"],
  ["baie01", "baie02"], ["baie01", "baie03"],
];

// ============================================================
// CONSTRUIRE CONFIG PANNELLUM
// ============================================================
let panoramaActiva = "hol01";

function buildConfig() {
  const scenes = {};
  panorame.forEach(p => {
    const hotspots = [];
    legaturi.forEach(([a, b]) => {
      if (a === p.id) hotspots.push({ type: "scene", sceneId: b, text: panorame.find(x=>x.id===b).titlu, pitch: -20, yaw: 0 });
      if (b === p.id) hotspots.push({ type: "scene", sceneId: a, text: panorame.find(x=>x.id===a).titlu, pitch: -20, yaw: 0 });
    });
    scenes[p.id] = {
      title: p.titlu,
      panorama: p.fisier,
      hotSpots: hotspots
    };
  });
  return {
    default: { firstScene: "hol01", autoLoad: true, showControls: true, compass: false },
    scenes
  };
}

const viewer = pannellum.viewer('viewer', buildConfig());

viewer.on('scenechange', function(sceneId) {
  panoramaActiva = sceneId;
  const p = panorame.find(x => x.id === sceneId);
  document.getElementById('pano-title').textContent = p ? p.titlu : '';
  updateDots();
});

// ============================================================
// PLAN - generare puncte
// ============================================================
function renderDots() {
  const container = document.getElementById('plan-container');
  container.querySelectorAll('.plan-dot').forEach(d => d.remove());
  panorame.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'plan-dot' + (p.id === panoramaActiva ? ' active' : '');
    dot.id = 'dot-' + p.id;
    dot.title = p.titlu;
    dot.style.left = p.planX + '%';
    dot.style.top = p.planY + '%';
    dot.style.width = p.marime + 'px';
    dot.style.height = p.marime + 'px';
    dot.onclick = (e) => { if (!editMode) { viewer.loadScene(p.id); togglePlan(); } e.stopPropagation(); };
    container.appendChild(dot);
    if (editMode) enableDrag(dot, p);
  });
}

function updateDots() {
  panorame.forEach(p => {
    const dot = document.getElementById('dot-' + p.id);
    if (dot) dot.className = 'plan-dot' + (p.id === panoramaActiva ? ' active' : '');
  });
}

let planOpen = false;
function togglePlan() {
  planOpen = !planOpen;
  document.getElementById('plan-panel').classList.toggle('open', planOpen);
  document.getElementById('plan-overlay').classList.toggle('open', planOpen);
  if (planOpen) renderDots();
}

// ============================================================
// MODUL EDITARE
// ============================================================
let editMode = false;

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('btn-edit');
  btn.classList.toggle('editing', editMode);
  btn.textContent = editMode ? '✅ Gata editare' : '✏️ Editează plan';
  document.getElementById('edit-hint').classList.toggle('visible', editMode);
  document.getElementById('btn-export').classList.toggle('visible', editMode);
  if (!planOpen) togglePlan();
  else renderDots();
}

function enableDrag(dot, panoData) {
  let dragging = false, startX, startY, startLeft, startTop;
  const container = document.getElementById('plan-container');

  dot.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startLeft = panoData.planX; startTop = panoData.planY;
    e.preventDefault(); e.stopPropagation();
  });

  dot.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startLeft = panoData.planX; startTop = panoData.planY;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = container.getBoundingClientRect();
    const dx = ((e.clientX - startX) / rect.width) * 100;
    const dy = ((e.clientY - startY) / rect.height) * 100;
    panoData.planX = Math.max(0, Math.min(100, startLeft + dx));
    panoData.planY = Math.max(0, Math.min(100, startTop + dy));
    dot.style.left = panoData.planX + '%';
    dot.style.top = panoData.planY + '%';
  });

  document.addEventListener('mouseup', () => { dragging = false; });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const rect = container.getBoundingClientRect();
    const dx = ((e.touches[0].clientX - startX) / rect.width) * 100;
    const dy = ((e.touches[0].clientY - startY) / rect.height) * 100;
    panoData.planX = Math.max(0, Math.min(100, startLeft + dx));
    panoData.planY = Math.max(0, Math.min(100, startTop + dy));
    dot.style.left = panoData.planX + '%';
    dot.style.top = panoData.planY + '%';
  }, { passive: false });

  document.addEventListener('touchend', () => { dragging = false; });

  // Scroll = schimba marimea
  dot.addEventListener('wheel', e => {
    e.preventDefault();
    panoData.marime = Math.max(12, Math.min(40, panoData.marime - Math.sign(e.deltaY) * 2));
    dot.style.width = panoData.marime + 'px';
    dot.style.height = panoData.marime + 'px';
  }, { passive: false });
}

function exportPositions() {
  const lines = panorame.map(p =>
    `  { id: "${p.id}", titlu: "${p.titlu}", fisier: "${p.fisier}", planX: ${p.planX.toFixed(1)}, planY: ${p.planY.toFixed(1)}, marime: ${p.marime} },`
  ).join('\n');
  const out = document.getElementById('export-output');
  out.textContent = lines;
  out.classList.add('visible');
  navigator.clipboard.writeText(lines).catch(()=>{});
}
</script>
</body>
</html>
